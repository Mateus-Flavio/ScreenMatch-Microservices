spring.application.name=usuario-service

server.port=8081

spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/usuarios_db
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# MAILGUN SMTP

spring.mail.host=smtp.mailgun.org
spring.mail.port=587

spring.mail.username=SEU_EMAIL_MAILGUN
spring.mail.password=SUA_SENHA_MAILGUN

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

aws.s3.bucket=SEU_BUCKET_S3
aws.region=us-east-2