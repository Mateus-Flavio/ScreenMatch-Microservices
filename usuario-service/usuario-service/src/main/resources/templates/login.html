<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - ScreenMatch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container" style="max-width: 400px; margin-top: 50px;">

    <h2 class="text-center">Login</h2>

    <!-- MENSAGENS DO SISTEMA -->

    <div th:if="${param.cadastroSucesso}" class="alert alert-success">
        Cadastro realizado com sucesso!
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
        Email ou senha inválidos
    </div>

    <div th:if="${param.senhaAlterada}" class="alert alert-success">
        Senha alterada com sucesso
    </div>

    <!-- FORMULÁRIO -->

    <form th:action="@{/login}" method="post">

        <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-control" name="username" placeholder="Digite seu email" required>
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" class="form-control" name="password" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Entrar</button>

        <div class="text-center" style="margin-top: 10px;">
            <a th:href="@{/cadastro}">Cadastrar</a> |
            <a th:href="@{/esqueci-senha}">Esqueci minha senha</a>
        </div>

    </form>

</div>

</body>
</html>
