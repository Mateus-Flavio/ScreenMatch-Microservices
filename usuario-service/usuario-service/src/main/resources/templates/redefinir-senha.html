<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Redefinir Senha - ScreenMatch</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #243b55;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #243b55;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #141e30;
        }

        .voltar {
            margin-top: 15px;
            display: block;
            font-size: 14px;
            text-decoration: none;
            color: #243b55;
        }

        .voltar:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Redefinir Senha</h2>

    <form action="/redefinir-senha" method="post">
        <input type="hidden" name="token" th:value="${token}" />

        <input type="password" name="senha" placeholder="Digite a nova senha" required />

        <button type="submit">Salvar Nova Senha</button>
    </form>

    <a href="/login" class="voltar">Voltar para o Login</a>
</div>

</body>
</html>
