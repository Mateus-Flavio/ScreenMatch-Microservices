<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - ScreenMatch</title>
    <!-- Bootstrap 5 (recomendado) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Ou mantenha Bootstrap 3 se preferir: -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <style>
        body { background-color: #f8f9fa; }
        .cadastro-container { max-width: 400px; margin: 80px auto; padding: 30px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="cadastro-container">
    <h2 class="text-center mb-4">Cadastro</h2>

    <!-- Mensagem de erro (ex: email já existe) -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/cadastro}" th:object="${usuario}" method="post">
        <div class="mb-3">  <!-- Bootstrap 5: mb-3 substitui form-group -->
            <label for="nome" class="form-label">Nome</label>
            <input type="text" th:field="*{nome}" class="form-control" id="nome" placeholder="Digite seu nome" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="Digite seu email" required>
        </div>

        <div class="mb-3">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" th:field="*{senha}" class="form-control" id="senha" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn btn-success w-100">Cadastrar</button>  <!-- w-100 = full width, substitui btn-block -->

        <div class="text-center mt-3">
            <a th:href="@{/login}">Voltar ao login</a>
        </div>
    </form>
</div>

<!-- Bootstrap JS (opcional, para tooltips etc., mas útil) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
