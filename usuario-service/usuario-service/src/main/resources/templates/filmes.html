<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Filmes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Lista de Filmes</h1>

        <div class="d-flex gap-2">

            <a href="http://localhost:8082/filmes/novo" class="btn btn-success">
                Cadastrar Filme
            </a>

            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-danger">
                    Sair
                </button>
            </form>

            <a href="/home" class="btn btn-secondary">
                Voltar
            </a>

        </div>

    </div>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-striped table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Descrição</th>
                    <th>Gênero</th>
                    <th>Ano</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="filme : ${filmes}">
                    <td th:text="${filme.id}"></td>
                    <td th:text="${filme.titulo}"></td>
                    <td th:text="${filme.descricao}"></td>
                    <td th:text="${filme.genero}"></td>
                    <td th:text="${filme.ano}"></td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
