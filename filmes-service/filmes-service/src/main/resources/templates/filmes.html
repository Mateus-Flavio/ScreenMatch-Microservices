<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Filmes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Lista de Filmes</h1>

        <div class="d-flex gap-2">

            <a th:href="@{/filmes/novo(usuarioId=${usuarioId})}"
               class="btn btn-success">
                Cadastrar Filme
            </a>

            <a th:href="@{'http://localhost:5173/?usuarioId=' + ${usuarioId}}"
               class="btn btn-dark"
               target="_blank">
                📊 Dashboard React
            </a>

        </div>
    </div>

    <form th:action="@{/filmes/buscar}" method="get" class="mb-4 d-flex gap-2">

        <input type="hidden" name="usuarioId" th:value="${usuarioId}">

        <input type="text"
               name="titulo"
               class="form-control"
               placeholder="Buscar filme pelo título">

        <button type="submit" class="btn btn-primary">
            Buscar
        </button>

        <a th:href="@{/filmes(usuarioId=${usuarioId})}" class="btn btn-secondary">
            Limpar
        </a>
    </form>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-striped table-hover">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Descrição</th>
                    <th>Gênero</th>
                    <th>Ano</th>
                    <th>Ações</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="filme : ${filmes}">
                    <td th:text="${filme.id}"></td>
                    <td th:text="${filme.titulo}"></td>
                    <td th:text="${filme.descricao}"></td>
                    <td th:text="${filme.genero}"></td>
                    <td th:text="${filme.ano}"></td>

                    <td>
                        <a th:href="@{/filmes/editar/{id}(id=${filme.id}, usuarioId=${usuarioId})}"
                           class="btn btn-warning btn-sm">
                            Editar
                        </a>

                        <a th:href="@{/filmes/excluir/{id}(id=${filme.id}, usuarioId=${usuarioId})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Deseja excluir este filme?')">
                            Excluir
                        </a>
                    </td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

    <div class="mt-4 d-flex justify-content-center gap-2">

        <a th:href="@{/filmes(usuarioId=${usuarioId}, pagina=0)}" class="btn btn-outline-primary btn-sm">
            1
        </a>

        <a th:href="@{/filmes(usuarioId=${usuarioId}, pagina=1)}" class="btn btn-outline-primary btn-sm">
            2
        </a>

        <a th:href="@{/filmes(usuarioId=${usuarioId}, pagina=2)}" class="btn btn-outline-primary btn-sm">
            3
        </a>

    </div>

</div>

</body>
</html>
