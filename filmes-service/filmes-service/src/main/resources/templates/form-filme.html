<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Filme</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h2>Cadastrar Novo Filme</h2>
        </div>

        <div class="card-body">

            <form th:action="@{/filmes/salvar}" th:object="${filme}" method="post">

                <input type="hidden" th:field="*{usuarioId}">

                <div class="mb-3">
                    <label class="form-label">Título</label>
                    <input type="text"
                           th:field="*{titulo}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descrição</label>
                    <textarea th:field="*{descricao}"
                              class="form-control"
                              rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Gênero</label>
                    <input type="text"
                           th:field="*{genero}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ano</label>
                    <input type="number"
                           th:field="*{ano}"
                           class="form-control"
                           required>
                </div>

                <button type="submit" class="btn btn-success">
                    Salvar Filme
                </button>

                <a th:href="@{/filmes(usuarioId=${filme.usuarioId})}" class="btn btn-secondary">
                    Voltar
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
